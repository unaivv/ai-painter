  <text x="234" y="174" font-family="monospace" font-size="12" fill="#c2c3c7">&#9658; Manual painting with drag support</text>
  <text x="234" y="192" font-family="monospace" font-size="12" fill="#c2c3c7">&#9658; 16-color Pico-8 palette · 16x16 to 64x64</text>

